<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простій калькулятор</title>
</head>
<body>
<script>
    let inputX = prompt("Введіть перший доданок", 0);
    let inputY = prompt("Введіть другий доданок", 0);

    let x = +inputX;
    let y = Number(inputY);

    console.log(typeof x);
    console.log(typeof y);

    let sum = x + y;
    // let sum = inputX + inputY;
    console.log(typeof sum);

    alert(sum);
</script>
