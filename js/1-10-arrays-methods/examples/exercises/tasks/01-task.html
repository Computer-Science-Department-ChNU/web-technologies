<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1</title>
</head>
<body>
<pre>
    Завдання:
    Запросіть у користувача ввести назву міста.
    Видаліть це місто з елементів масиву.
    Якщо міста немає в масиві, сповістіть про це користувача.
    Виведіть масив на екран після видалення елементів.
</pre>
<script>
    let cities = ["London", "Paris", "Berlin", "Rome", "Budapest", "Lisbon", "Madrid", "Amsterdam"]

    let input=prompt("Enter your city");
    let index=cities.indexOf(input);

    if(index==-1){
        alert("There is no such city!")
    } else{
        cities.splice(index,1)
        alert(cities)
    }
</script>
</body>
</html>
